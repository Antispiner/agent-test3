services:
  server:
    build: ./server
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANCESTOR_DB_PATH: /data/ancestors.db
    volumes:
      - ./data:/data
    expose:
      - "8080"
    restart: unless-stopped

  nginx:
    build: ./web
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
